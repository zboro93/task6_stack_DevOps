name: "Terraform Apply"

#on:
#  push:
#    branches:
#    - main
#    paths:
#    - terraform/**

on:
  workflow_dispatch:
    inputs:
      environment:
        options:
         - dev
         - prod
        type: choice
        description: Environment to choose
        required: true

    
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  
jobs:
  terraform:
    name: "Apply Terraform Infra"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    env:
      TARGET_ENV: ${{ github.event.inputs.environment }}

      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Debug Env
        run: |
          echo "Target ENV: $TARGET_ENV"        
      
      - name: Setup Terraform with version
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5
          
      - name: Terraform init
        id: init
        run: terraform init -backend-config="./backend-${TARGET_ENV}.hcl"

      - name: Terraform validate
        id: validate
        run: terraform validate
      
      - name: terraform apply
        id: apply
        run: terraform apply -auto-approve -input=false -var-file="envs/${TARGET_ENV}.tfvars"

      - name: terraform output
        id: output
        run: terraform output
      
      - run: mkdir -p artifact

      - name: Save Public IP
        run: |
          terraform output -raw ubuntu_public_ip > artifact/aws-ec2-pub-ip.txt
          
      - name: Upload Public IP do artifacts
        uses: actions/upload-artifact@v5
        with:
          name: aws-ec2-pub-ip
          path: terraform/artifact/aws-ec2-pub-ip.txt
